<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crypto Trading Bot</title>
    <link rel="stylesheet" href="static/css/main.css">
    <link rel="stylesheet" href="static/css/dashboard.css">
    <link rel="stylesheet" href="static/css/trades.css">
    <link rel="stylesheet" href="static/css/settings.css">
    <link rel="stylesheet" href="static/css/themes.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.js"></script>
</head>
<body>
    <div id="app">
        <nav id="main-nav">
            <div class="nav-brand">
                <div class="logo-animation">
                    <svg class="crypto-logo" width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
                        <path d="M12 20 L20 12 L28 20 L20 28 Z" fill="url(#logoGradient)"/>
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4ff"/>
                                <stop offset="100%" style="stop-color:#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>CryptoAI Bot</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="#dashboard" class="nav-link active" data-page="dashboard">Dashboard</a></li>
                <li><a href="#trades" class="nav-link" data-page="trades">Trades</a></li>
                <li><a href="#settings" class="nav-link" data-page="settings">Settings</a></li>
            </ul>
            <div class="nav-status">
                <div class="connection-status" data-status="connected">
                    <div class="status-indicator"></div>
                    <span class="status-text">Connected</span>
                </div>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="theme-icon" width="20" height="20" viewBox="0 0 24 24">
                        <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
                    </svg>
                </button>
            </div>
        </nav>
        
        <main id="main-content">
            <!-- Dynamic content loaded here -->
        </main>
        
        <div id="notification-container"></div>
        <div id="modal-container"></div>
        <div id="loader-overlay" class="loader-overlay hidden">
            <div class="loader-content">
                <div class="crypto-spinner">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="25" fill="none" stroke="url(#spinnerGradient)" stroke-width="3"/>
                        <path d="M15 30 L30 15 L45 30 L30 45 Z" fill="url(#spinnerGradient)"/>
                        <defs>
                            <linearGradient id="spinnerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4ff"/>
                                <stop offset="100%" style="stop-color:#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <p class="loader-text">Processing...</p>
            </div>
        </div>
    </div>
    
    <script type="module" src="static/js/main.js"></script>
</body>
</html>
